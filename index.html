<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeizureX | Neural AI Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: rgba(13, 17, 23, 0.8);
            --border: rgba(0, 242, 255, 0.2);
            --accent: #00f2ff;
            --critical: #ff3e3e;
            --safe: #00ffaf;
            --txt: #f0f6fc;
            --txt-dim: #8b949e;
            --chb: #0077ff;
            --seize: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: #010409;
            border-right: 1px solid var(--border);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            padding: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 0.6rem;
            transition: 0.3s;
            color: var(--txt-dim);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(0, 242, 255, 0.05);
            color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .stage {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        .page.active {
            display: block;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2.5rem;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- DUAL SECTION GALLERY --- */
        .section-header {
            letter-spacing: 3px;
            font-size: 0.75rem;
            color: var(--txt-dim);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .artifact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .artifact-card {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: zoom-in;
            transition: 0.4s;
            position: relative;
        }

        .artifact-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .artifact-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            background: #000;
        }

        .artifact-meta {
            padding: 1.2rem;
        }

        .domain-badge {
            font-size: 0.5rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            color: #000;
            margin-bottom: 8px;
            display: inline-block;
        }

        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        #modalImg {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        /* MONITOR VIEW */
        .detector-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2.5rem;
        }

        .monitor-view {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 1.5rem;
            height: 380px;
            margin-top: 1.5rem;
        }

        .monitor-screen {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem;
            position: relative;
        }
    </style>
</head>

<body>

    <div id="loader"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; display:none; align-items:center; justify-content:center; flex-direction:column;">
        <div
            style="width:60px; height:60px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite;">
        </div>
        <p style="margin-top:2rem; font-weight:700; color:var(--accent); letter-spacing:4px;">SYNCING SEIZURE_X ENGINE
        </p>
    </div>

    <div id="modal" onclick="this.style.display='none'"><img id="modalImg"></div>

    <nav class="sidebar">
        <div style="font-weight:800; font-size:1.8rem; margin-bottom:4rem; letter-spacing:-2px;">Seizure<span
                style="color:var(--accent)">X</span></div>
        <div class="nav-link active" onclick="switchPage('bio', this)">💊 <span>Neural Engine</span></div>
        <div class="nav-link" id="navArch" onclick="switchPage('arch', this)">📂 <span>Archives</span></div>
    </nav>

    <main class="stage">

        <div id="page-bio" class="page active">
            <div class="glass-card"
                style="display:flex; justify-content:space-between; align-items:center; border-left:6px solid var(--accent);">
                <div>
                    <p
                        style="font-family:'JetBrains Mono'; font-size:0.6rem; color:var(--txt-dim); text-transform:uppercase; letter-spacing:2px;">
                        Engine Verdict</p>
                    <div style="font-size: 2.2rem; font-weight: 700;" id="vStatus">READY</div>
                </div>
                <button class="btn" id="pdfBtn" style="display:none;" onclick="exportReport()">📄 EXPORT PDF</button>
            </div>

            <div class="detector-grid">
                <section>
                    <div class="glass-card" style="padding:1.5rem;">
                        <p style="font-size:0.6rem; color:var(--txt-dim); letter-spacing:2px; margin-bottom:1rem;">
                            TIMELINE SYNCHRONIZATION</p>
                        <div
                            style="height:60px; background:#000; border-radius:12px; border:1px solid var(--border); overflow:hidden;">
                            <canvas id="timelineMap" style="width:100%; height:100%;"></canvas></div>
                    </div>
                    <div class="monitor-view">
                        <div class="monitor-screen"><canvas id="wChart"></canvas></div>
                        <div class="monitor-screen"><canvas id="aChart"></canvas></div>
                    </div>
                </section>
                <aside>
                    <div class="glass-card">
                        <div id="dropZone"
                            style="border:2px dashed var(--border); border-radius:16px; padding:2rem 1rem; text-align:center; cursor:pointer;">
                            <span id="fName">CHOOSE EDF</span><input type="file" id="fIn" hidden accept=".edf"></div>
                        <select id="exp"
                            style="width:100%; padding:1rem; background:#000; border:1px solid var(--border); border-radius:12px; margin:1rem 0; color:white; font-family:'Space Grotesk';">
                            <option value="chb_to_chb">SeizureX ➔ CHB-MIT (Intra)</option>
                        </select><button class="btn" id="runBtn" style="width:100%;" disabled>BOOT NEURAL CORE</button>
                    </div>
                    <div class="glass-card" id="eList" style="max-height: 400px; overflow-y: auto;"></div>
                </aside>
            </div>
        </div>

        <div id="page-arch" class="page">
            <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">Research <span style="color:var(--accent)">Vault</span>
            </h1>

            <div class="section-header" style="color:var(--accent)">CLINICAL REPORTS COLLECTION</div>
            <div id="arch-reports" style="margin-bottom: 3rem;"></div>

            <div class="section-header" style="color:var(--chb)">CLINICAL SEIZURE ANALYSIS (CHB-MIT)</div>
            <div class="artifact-grid" id="grid-chb"></div>

            <div class="section-header" style="color:var(--seize)">WEARABLE SEIZURE ANALYSIS (SEIZEIT2)</div>
            <div class="artifact-grid" id="grid-seize"></div>

            <div class="section-header">CROSS-DOMAIN & PERFORMANCE METRICS</div>
            <div class="artifact-grid" id="grid-analytics"></div>
        </div>
    </main>

    <script>
        let wChart, aChart, rawData;
        const fIn = document.getElementById('fIn');
        const runBtn = document.getElementById('runBtn');
        const loader = document.getElementById('loader');

        document.getElementById('dropZone').onclick = () => fIn.click();
        fIn.onchange = (e) => { if (e.target.files[0]) { document.getElementById('fName').innerText = e.target.files[0].name.toUpperCase(); runBtn.disabled = false; } };

        runBtn.onclick = async () => {
            const fd = new FormData(); fd.append('file', fIn.files[0]); loader.style.display = 'flex';
            try {
                const r = await fetch(`http://localhost:8000/predict?experiment=${document.getElementById('exp').value}`, { method: 'POST', body: fd });
                rawData = await r.json(); updateUI(rawData); document.getElementById('pdfBtn').style.display = 'block';
            } catch (e) { alert("Core Comms Lost"); }
            finally { loader.style.display = 'none'; }
        };

        function updateUI(data) {
            const vS = document.getElementById('vStatus'); vS.innerText = data.final_prediction ? "🚨 SEIZURE DETECTED" : "✅ EEG STABLE"; vS.style.color = data.final_prediction ? "#ff3e3e" : "#00ffaf";
            const c = document.getElementById('timelineMap'); const ctx = c.getContext('2d'); c.width = c.offsetWidth; c.height = c.offsetHeight; const w = c.width / data.timeline.length; ctx.clearRect(0, 0, c.width, c.height);
            data.timeline.forEach((d, i) => { if (d.is_seizure) { ctx.fillStyle = '#ff3e3e'; ctx.fillRect(i * w, 0, Math.ceil(w), c.height); } });
            c.onclick = (e) => focusOn(Math.floor(((e.clientX - c.getBoundingClientRect().left) / c.width) * data.timeline.length));
            document.getElementById('eList').innerHTML = data.events.map(e => `<div style="padding:1rem; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; cursor:pointer;" onclick="focusOnSync(${e.start})"><div style="font-weight:700; font-size:0.8rem; color:var(--accent);">Neural Burst</div><div style="font-family:'JetBrains Mono'; font-size:0.7rem;">${Math.round(e.start)}s - ${Math.round(e.end)}s</div></div>`).join('') || '<p style="text-align:center; padding:2rem; font-size:0.7rem; color:var(--txt-dim);">No significant bursts</p>';
            if (data.events.length > 0) focusOnSync(data.events[0].start); else focusOn(0);
        }

        async function exportReport() {
            if (!rawData) return; loader.style.display = 'flex';
            const r = await fetch('http://localhost:8000/api/report/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(rawData) });
            const { url } = await r.json(); window.open(`http://localhost:8000${url}`, '_blank'); loader.style.display = 'none';
        }

        async function loadArchives() {
            const r = await fetch('http://localhost:8000/api/outputs/explorer');
            const d = await r.json();
            const chbGrid = document.getElementById('grid-chb');
            const seizeGrid = document.getElementById('grid-seize');
            const analyticGrid = document.getElementById('grid-analytics');

            chbGrid.innerHTML = ''; seizeGrid.innerHTML = ''; analyticGrid.innerHTML = '';

            const renderItem = (x, badge, color, txtColor) => `
            <div class="artifact-card" onclick="zoom('${x.url}')">
                <img src="http://localhost:8000${x.url}" class="artifact-img">
                <div class="artifact-meta">
                    <div class="domain-badge" style="background:${color}; color:${txtColor}">${badge}</div>
                    <div style="font-size:0.85rem; font-weight:700;">${x.name}</div>
                </div>
            </div>`;

            // Smart Path-Based Sorting
            const allItems = [...d.xai, ...d.plots];
            allItems.forEach(x => {
                const path = (x.url + x.name).toUpperCase();
                if (path.includes('CHB_TO_CHB') || (path.includes('CHB') && !path.includes('SEIZE'))) {
                    chbGrid.innerHTML += renderItem(x, 'Clinical Artifact', 'var(--chb)', 'white');
                } else if (path.includes('SEIZE_TO_SEIZE') || (path.includes('SEIZE') && !path.includes('CHB'))) {
                    seizeGrid.innerHTML += renderItem(x, 'Wearable Artifact', 'var(--seize)', 'black');
                } else {
                    analyticGrid.innerHTML += renderItem(x, 'Domain Sync Analysis', 'linear-gradient(90deg, var(--chb), var(--seize))', 'white');
                }
            });

            document.getElementById('arch-reports').innerHTML = d.reports.map(r => `<div style="border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02);"><span>📄 ${r.name}</span><button class="btn" style="padding:0.5rem 1rem; font-size:0.6rem;" onclick="window.open('http://localhost:8000${r.url}','_blank')">VIEW REPORT</button></div>`).join('') || '<p style="font-size:0.8rem; opacity:0.5; text-align:center; padding:2rem;">No clinical reports archived yet. Run an analysis to generate one.</p>';
        }

        function zoom(url) { document.getElementById('modalImg').src = 'http://localhost:8000' + url; document.getElementById('modal').style.display = 'flex'; }
        function focusOnSync(t) { focusOn(rawData.timeline.findIndex(d => d.time >= t)); }
        function focusOn(idx) {
            const d = rawData.timeline[idx];
            setTimeout(() => {
                const wc = document.getElementById('wChart').getContext('2d'); if (wChart) wChart.destroy();
                wChart = new Chart(wc, { type: 'line', data: { labels: Array(d.signal.length).fill(''), datasets: [{ data: d.signal, borderColor: '#00f2ff', borderWidth: 2, pointRadius: 0, tension: 0.1 }] }, options: { maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: true, grid: { color: 'rgba(255,255,255,0.05)' } } }, plugins: { legend: { display: false } } } });
                const ac = document.getElementById('aChart').getContext('2d'); if (aChart) aChart.destroy();
                aChart = new Chart(ac, { type: 'bar', data: { labels: d.attention.map((_, i) => i), datasets: [{ data: d.attention, backgroundColor: d.attention.map(v => `rgba(0,242,255,${Math.max(0.1, v * 10)})`), borderRadius: 4 }] }, options: { indexAxis: 'y', maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } } });
            }, 50);
        }
        function switchPage(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pId}`).classList.add('active'); el.classList.add('active');
            if (pId === 'arch') loadArchives();
        }
    </script>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
